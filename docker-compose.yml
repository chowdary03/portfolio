services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: portfolio-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
